<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --chat-bg: var(--bg, #1a1a2e);
      --chat-surface: var(--card-bg, #16213e);
      --chat-border: var(--divider-color, rgba(255,255,255,0.08));
      --chat-text: var(--text-color, #e0e0e0);
      --chat-text-muted: var(--text-color-muted, #888);
      --chat-primary: var(--c-primary, #4fc3f7);
      --chat-accent: var(--c-accent, #81c784);
      --chat-warn: var(--c-warn, #ffb74d);
      --chat-user-bg: var(--c-primary, #4fc3f7);
      --chat-user-text: #fff;
      --chat-bot-bg: var(--card-bg, #1e2a4a);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--chat-bg); color: var(--chat-text);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; border-bottom: 1px solid var(--chat-border);
      background: var(--chat-surface); flex-shrink: 0;
    }
    .header-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .header-title svg { width: 18px; height: 18px; color: var(--chat-primary); }
    .header-actions { display: flex; gap: 4px; }
    .header-actions button {
      background: none; border: none; color: var(--chat-text-muted);
      cursor: pointer; padding: 4px 8px; border-radius: 4px; font-size: 12px;
    }
    .header-actions button:hover { color: var(--chat-text); background: rgba(255,255,255,0.05); }
    .chat-container { flex: 1; overflow-y: auto; padding: 12px; scroll-behavior: smooth; }
    .welcome { text-align: center; padding: 40px 20px; color: var(--chat-text-muted); }
    .welcome-icon { font-size: 48px; margin-bottom: 12px; }
    .welcome h3 { font-size: 16px; color: var(--chat-text); margin-bottom: 8px; }
    .welcome p { font-size: 13px; line-height: 1.5; }
    .quick-actions { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 16px; }
    .quick-action {
      background: var(--chat-surface); border: 1px solid var(--chat-border);
      color: var(--chat-primary); padding: 6px 12px; border-radius: 16px;
      font-size: 12px; cursor: pointer; transition: all 0.15s;
    }
    .quick-action:hover { background: var(--chat-primary); color: #fff; border-color: var(--chat-primary); }
    .message { margin-bottom: 12px; display: flex; flex-direction: column; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .message.user { align-items: flex-end; }
    .message.assistant { align-items: flex-start; }
    .msg-bubble {
      max-width: 85%; padding: 10px 14px; border-radius: 12px;
      font-size: 13px; line-height: 1.5; word-break: break-word;
    }
    .message.user .msg-bubble { white-space: pre-wrap; }
    .message.assistant .msg-bubble { overflow-x: auto; }

    /* Markdown styles */
    .msg-bubble h1, .msg-bubble h2, .msg-bubble h3, .msg-bubble h4 { margin: 8px 0 4px; line-height: 1.3; }
    .msg-bubble h1 { font-size: 16px; }
    .msg-bubble h2 { font-size: 15px; }
    .msg-bubble h3 { font-size: 14px; }
    .msg-bubble h4 { font-size: 13px; }
    .msg-bubble p { margin: 4px 0; }
    .msg-bubble ul, .msg-bubble ol { margin: 4px 0; padding-left: 20px; }
    .msg-bubble li { margin: 2px 0; }
    .msg-bubble code {
      background: rgba(255,255,255,0.08); padding: 1px 5px; border-radius: 3px;
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;
    }
    .msg-bubble pre {
      background: rgba(0,0,0,0.3); border: 1px solid var(--chat-border);
      border-radius: 6px; padding: 10px; margin: 6px 0; overflow-x: auto;
    }
    .msg-bubble pre code {
      background: none; padding: 0; font-size: 12px; line-height: 1.4;
    }
    .msg-bubble blockquote {
      border-left: 3px solid var(--chat-primary); padding-left: 10px;
      margin: 6px 0; color: var(--chat-text-muted);
    }
    .msg-bubble table {
      border-collapse: collapse; margin: 6px 0; font-size: 12px; width: 100%;
    }
    .msg-bubble th, .msg-bubble td {
      border: 1px solid var(--chat-border); padding: 4px 8px; text-align: left;
    }
    .msg-bubble th { background: rgba(255,255,255,0.05); font-weight: 600; }
    .msg-bubble a { color: var(--chat-primary); text-decoration: none; }
    .msg-bubble a:hover { text-decoration: underline; }
    .msg-bubble hr { border: none; border-top: 1px solid var(--chat-border); margin: 8px 0; }
    .msg-bubble strong { font-weight: 600; }
    .msg-bubble em { font-style: italic; }
    .message.user .msg-bubble { background: var(--chat-user-bg); color: var(--chat-user-text); border-bottom-right-radius: 4px; }
    .message.assistant .msg-bubble { background: var(--chat-bot-bg); border: 1px solid var(--chat-border); border-bottom-left-radius: 4px; }
    .msg-time { font-size: 10px; color: var(--chat-text-muted); margin-top: 3px; padding: 0 4px; }
    .action-cards { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; max-width: 85%; }
    .action-card {
      display: flex; align-items: center; gap: 8px; padding: 6px 10px;
      background: rgba(79,195,247,0.08); border: 1px solid rgba(79,195,247,0.15);
      border-radius: 8px; font-size: 11px; color: var(--chat-text-muted);
    }
    .action-card .action-icon { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
    .action-card.success .action-icon { color: var(--chat-accent); }
    .action-card.error .action-icon { color: var(--chat-warn); }
    .action-card .action-name { font-weight: 600; color: var(--chat-primary); }
    .action-card .action-detail { color: var(--chat-text-muted); }
    .thinking {
      display: flex; align-items: center; gap: 8px; padding: 10px 14px;
      background: var(--chat-bot-bg); border: 1px solid var(--chat-border);
      border-radius: 12px; border-bottom-left-radius: 4px;
      font-size: 13px; color: var(--chat-text-muted); max-width: 85%;
    }
    .thinking-dots { display: flex; gap: 3px; }
    .thinking-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--chat-primary); animation: bounce 1.2s infinite; }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }
    .input-area {
      display: flex; align-items: flex-end; gap: 8px; padding: 10px 12px;
      border-top: 1px solid var(--chat-border); background: var(--chat-surface); flex-shrink: 0;
    }
    .input-area textarea {
      flex: 1; background: var(--chat-bg); border: 1px solid var(--chat-border);
      border-radius: 10px; padding: 10px 12px; color: var(--chat-text);
      font-size: 13px; font-family: inherit; resize: none;
      min-height: 40px; max-height: 120px; outline: none; line-height: 1.4;
    }
    .input-area textarea:focus { border-color: var(--chat-primary); }
    .input-area textarea::placeholder { color: var(--chat-text-muted); }
    .send-btn {
      width: 40px; height: 40px; border-radius: 50%; border: none;
      background: var(--chat-primary); color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn svg { width: 18px; height: 18px; }
    .error-banner {
      padding: 8px 12px; background: rgba(255,87,34,0.15);
      border: 1px solid rgba(255,87,34,0.3); color: var(--chat-warn);
      font-size: 12px; text-align: center; cursor: pointer;
    }
    .error-banner:hover { background: rgba(255,87,34,0.25); }
    .config-warning { text-align: center; padding: 40px 20px; }
    .config-warning h3 { font-size: 16px; margin-bottom: 8px; }
    .config-warning p { font-size: 13px; color: var(--chat-text-muted); line-height: 1.5; }
    .config-warning .setup-btn {
      margin-top: 16px; padding: 10px 24px; background: var(--chat-primary);
      color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer;
    }

    /* Settings modal */
    .settings-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100;
      display: flex; align-items: center; justify-content: center;
    }
    .settings-overlay.hidden { display: none; }
    .settings-panel {
      background: var(--chat-surface); border: 1px solid var(--chat-border);
      border-radius: 12px; padding: 20px; width: 90%; max-width: 360px;
      max-height: 80vh; overflow-y: auto;
    }
    .settings-panel h3 { font-size: 15px; margin-bottom: 16px; }
    .settings-field { margin-bottom: 12px; }
    .settings-field label { display: block; font-size: 12px; color: var(--chat-text-muted); margin-bottom: 4px; }
    .settings-field input, .settings-field select {
      width: 100%; padding: 8px 10px; background: var(--chat-bg);
      border: 1px solid var(--chat-border); border-radius: 6px;
      color: var(--chat-text); font-size: 13px; font-family: inherit; outline: none;
    }
    .settings-field input:focus, .settings-field select:focus { border-color: var(--chat-primary); }
    .settings-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .settings-actions button {
      padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none;
    }
    .btn-cancel { background: var(--chat-bg); color: var(--chat-text); border: 1px solid var(--chat-border) !important; }
    .btn-save { background: var(--chat-primary); color: #fff; }
    .model-info { font-size: 11px; color: var(--chat-text-muted); margin-top: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 2a4 4 0 0 1 4 4v1a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/>
        <rect x="4" y="8" width="16" height="12" rx="3"/>
        <circle cx="9" cy="14" r="1.5" fill="currentColor"/>
        <circle cx="15" cy="14" r="1.5" fill="currentColor"/>
      </svg>
      AI Assistant
      <span id="model-badge" style="font-size:10px;color:var(--chat-text-muted);font-weight:400;"></span>
    </div>
    <div class="header-actions">
      <button id="settings-btn" title="Settings">⚙️</button>
      <button id="clear-btn" title="Clear conversation">Clear</button>
    </div>
  </div>

  <div id="chat-container" class="chat-container"></div>

  <div class="input-area">
    <textarea id="input" placeholder="Ask me anything about your tasks..." rows="1"></textarea>
    <button id="send-btn" class="send-btn" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>

  <!-- Settings Modal -->
  <div id="settings-overlay" class="settings-overlay hidden">
    <div class="settings-panel">
      <h3>⚙️ AI Assistant Settings</h3>
      <div class="settings-field">
        <label>API Key *</label>
        <input type="password" id="cfg-apiKey" placeholder="sk-..." />
      </div>
      <div class="settings-field">
        <label>Base URL</label>
        <input type="text" id="cfg-baseUrl" placeholder="https://api.openai.com/v1" />
        <div class="model-info">OpenAI-compatible endpoint (include /v1 if needed)</div>
      </div>
      <div class="settings-field">
        <label>Model</label>
        <input type="text" id="cfg-model" placeholder="gpt-4o" />
      </div>
      <div class="settings-field">
        <label>Max Tokens</label>
        <input type="number" id="cfg-maxTokens" placeholder="4096" min="256" max="16384" />
      </div>
      <div class="settings-field">
        <label>Temperature</label>
        <input type="number" id="cfg-temperature" placeholder="0.7" min="0" max="2" step="0.1" />
      </div>
      <div class="settings-actions">
        <button class="btn-cancel" id="settings-cancel">Cancel</button>
        <button class="btn-save" id="settings-save">Save</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== STATE ====================
    var CONFIG_KEY = 'ai-assistant-config';
    var CONV_KEY = 'ai-assistant-conversation';
    var config = null;
    var messages = [];
    var isProcessing = false;
    var currentTaskId = null;

    // ==================== CONFIG PERSISTENCE ====================
    async function loadConfig() {
      try {
        var raw = await PluginAPI.loadSyncedData();
        if (raw) {
          var parsed = JSON.parse(raw);
          if (parsed && parsed[CONFIG_KEY]) {
            config = parsed[CONFIG_KEY];
            console.log('[AI] Config loaded, model:', config.model);
            return true;
          }
        }
      } catch (e) {
        console.error('[AI] loadConfig error:', e);
      }
      config = null;
      return false;
    }

    async function saveConfig(cfg) {
      config = cfg;
      try {
        // Load existing data to preserve conversation
        var raw = await PluginAPI.loadSyncedData();
        var data = {};
        if (raw) { try { data = JSON.parse(raw); } catch(e) {} }
        data[CONFIG_KEY] = cfg;
        await PluginAPI.persistDataSynced(JSON.stringify(data));
        console.log('[AI] Config saved');
        updateModelBadge();
      } catch (e) {
        console.error('[AI] saveConfig error:', e);
      }
    }

    async function loadConversation() {
      try {
        var raw = await PluginAPI.loadSyncedData();
        if (raw) {
          var parsed = JSON.parse(raw);
          if (parsed && parsed[CONV_KEY] && parsed[CONV_KEY].length > 0) {
            messages = parsed[CONV_KEY];
            var container = document.getElementById('chat-container');
            container.innerHTML = '';
            for (var i = 0; i < messages.length; i++) {
              var m = messages[i];
              if (m.role === 'user') {
                var text = m.content.split('\n\n---\n[App Context]')[0];
                displayMessage('user', text);
              } else if (m.role === 'assistant' && m.content) {
                displayMessage('assistant', m.content);
              }
            }
            return true;
          }
        }
      } catch (e) { console.error('[AI] loadConversation error:', e); }
      return false;
    }

    async function saveConversation() {
      try {
        var raw = await PluginAPI.loadSyncedData();
        var data = {};
        if (raw) { try { data = JSON.parse(raw); } catch(e) {} }
        data[CONV_KEY] = messages.slice(-50);
        await PluginAPI.persistDataSynced(JSON.stringify(data));
      } catch (e) { console.warn('[AI] saveConversation error:', e); }
    }

    // ==================== SETTINGS UI ====================
    function openSettings() {
      document.getElementById('cfg-apiKey').value = (config && config.apiKey) || '';
      document.getElementById('cfg-baseUrl').value = (config && config.baseUrl) || 'https://api.openai.com/v1';
      document.getElementById('cfg-model').value = (config && config.model) || 'gpt-4o';
      document.getElementById('cfg-maxTokens').value = (config && config.maxTokens) || 4096;
      document.getElementById('cfg-temperature').value = (config && config.temperature !== undefined) ? config.temperature : 0.7;
      document.getElementById('settings-overlay').classList.remove('hidden');
    }

    function closeSettings() {
      document.getElementById('settings-overlay').classList.add('hidden');
    }

    function doSaveSettings() {
      var cfg = {
        apiKey: document.getElementById('cfg-apiKey').value.trim(),
        baseUrl: document.getElementById('cfg-baseUrl').value.trim() || 'https://api.openai.com/v1',
        model: document.getElementById('cfg-model').value.trim() || 'gpt-4o',
        maxTokens: parseInt(document.getElementById('cfg-maxTokens').value) || 4096,
        temperature: parseFloat(document.getElementById('cfg-temperature').value),
      };
      if (isNaN(cfg.temperature)) cfg.temperature = 0.7;

      if (!cfg.apiKey) {
        alert('API Key is required');
        return;
      }

      saveConfig(cfg);
      closeSettings();

      // Refresh the view
      var container = document.getElementById('chat-container');
      if (messages.length > 0) {
        // Already have conversation
      } else {
        showWelcome();
      }
      showSnack('Settings saved!');
    }

    function updateModelBadge() {
      var badge = document.getElementById('model-badge');
      if (config && config.model) {
        badge.textContent = '(' + config.model + ')';
      } else {
        badge.textContent = '';
      }
    }

    // ==================== TOOL DEFINITIONS (aligned with Super-Productivity-MCP) ====================
    var tools = [
      // ---------- TASKS ----------
      { type:'function', function:{ name:'create_task', description:'Create a new task in Super Productivity. Tasks without a project go to the Inbox.', parameters:{ type:'object', properties:{
        title:{type:'string',description:'Task title'},
        notes:{type:'string',description:'Task notes/description'},
        project_id:{type:'string',description:'Project ID to assign task to'},
        parent_id:{type:'string',description:'Parent task ID for creating subtasks'},
        tag_ids:{type:'array',items:{type:'string'},description:'Tag IDs to assign'},
        due_day:{type:'string',description:'Due date YYYY-MM-DD'},
        time_estimate:{type:'number',description:'Time estimate in milliseconds'}
      }, required:['title'] }}},
      { type:'function', function:{ name:'get_tasks', description:'Get tasks with optional filters. By default returns non-done, non-archived tasks.', parameters:{ type:'object', properties:{
        project_id:{type:'string',description:'Filter by project ID'},
        tag_id:{type:'string',description:'Filter by tag ID'},
        include_done:{type:'boolean',description:'Include completed tasks (default false)'},
        include_archived:{type:'boolean',description:'Include archived tasks (default false)'},
        search_query:{type:'string',description:'Case-insensitive title/notes search'},
        parents_only:{type:'boolean',description:'Exclude subtasks, return only top-level tasks'},
        overdue:{type:'boolean',description:'Return only tasks with due date before today'},
        unscheduled:{type:'boolean',description:'Return only tasks with no due date'},
        planned_for_today:{type:'boolean',description:'Return only tasks planned for today'},
        recurring_only:{type:'boolean',description:'Return only recurring tasks'}
      }, required:[] }}},
      { type:'function', function:{ name:'update_task', description:'Update an existing task. Only pass fields you want to change.', parameters:{ type:'object', properties:{
        task_id:{type:'string',description:'Task ID to update'},
        title:{type:'string',description:'New title'},
        notes:{type:'string',description:'New notes'},
        is_done:{type:'boolean',description:'Mark as done/undone'},
        due_day:{type:'string',description:'Due date YYYY-MM-DD, or empty string to clear'},
        planned_at:{type:'number',description:'Unix ms timestamp to plan task (e.g. start of today). Null to unplan.'},
        time_estimate:{type:'number',description:'Time estimate in ms'},
        time_spent:{type:'number',description:'Time spent in ms'},
        tag_ids:{type:'array',items:{type:'string'},description:'Bulk-replace all tags with this list'},
        project_id:{type:'string',description:'Move to project'}
      }, required:['task_id'] }}},
      { type:'function', function:{ name:'complete_task', description:'Mark a single task as complete.', parameters:{ type:'object', properties:{
        task_id:{type:'string',description:'Task ID to complete'}
      }, required:['task_id'] }}},
      { type:'function', function:{ name:'delete_task', description:'Permanently delete a task. Deleting a parent also removes all subtasks.', parameters:{ type:'object', properties:{
        task_id:{type:'string',description:'Task ID to delete'}
      }, required:['task_id'] }}},
      { type:'function', function:{ name:'add_tag_to_task', description:'Add a single tag to a task without modifying its other tags. Idempotent.', parameters:{ type:'object', properties:{
        task_id:{type:'string',description:'Task ID'},
        tag_id:{type:'string',description:'Tag ID to add'}
      }, required:['task_id','tag_id'] }}},
      { type:'function', function:{ name:'remove_tag_from_task', description:'Remove a single tag from a task without modifying its other tags. Errors if tag not present.', parameters:{ type:'object', properties:{
        task_id:{type:'string',description:'Task ID'},
        tag_id:{type:'string',description:'Tag ID to remove'}
      }, required:['task_id','tag_id'] }}},
      { type:'function', function:{ name:'get_current_task', description:'Get the currently time-tracked task. Returns null when no task has an active timer.', parameters:{type:'object',properties:{},required:[]} }},
      { type:'function', function:{ name:'start_task', description:'Start the time tracker on a task. Stops other tracking automatically. Cannot start a completed task.', parameters:{ type:'object', properties:{
        task_id:{type:'string',description:'Task ID to start tracking'}
      }, required:['task_id'] }}},
      { type:'function', function:{ name:'stop_task', description:'Stop the currently running time tracker. Idempotent — succeeds if no timer running.', parameters:{type:'object',properties:{},required:[]} }},
      { type:'function', function:{ name:'bulk_complete_tasks', description:'Mark multiple tasks as complete in one operation. Max 100 tasks.', parameters:{ type:'object', properties:{
        task_ids:{type:'array',items:{type:'string'},description:'Array of task IDs to complete'}
      }, required:['task_ids'] }}},
      { type:'function', function:{ name:'bulk_update_tasks', description:'Update multiple tasks with different updates in one operation. Max 100.', parameters:{ type:'object', properties:{
        updates:{type:'array',items:{type:'object',properties:{
          task_id:{type:'string',description:'Task ID to update'},
          title:{type:'string',description:'New title'},
          notes:{type:'string',description:'New notes'},
          due_day:{type:'string',description:'Due date YYYY-MM-DD or empty to clear'},
          tag_ids:{type:'array',items:{type:'string'},description:'Replace all tags'},
          time_estimate:{type:'number',description:'Time estimate in ms'},
          time_spent:{type:'number',description:'Time spent in ms'}
        }},description:'Array of task updates'}
      }, required:['updates'] }}},
      { type:'function', function:{ name:'move_task_to_project', description:'Move a top-level task to a different project. Errors on subtasks.', parameters:{ type:'object', properties:{
        task_id:{type:'string',description:'Task ID to move'},
        project_id:{type:'string',description:'Destination project ID'}
      }, required:['task_id','project_id'] }}},
      { type:'function', function:{ name:'reorder_tasks', description:'Reorder tasks within a project or subtasks within a parent. Provide complete ordered list.', parameters:{ type:'object', properties:{
        task_ids:{type:'array',items:{type:'string'},description:'Complete ordered list of task IDs'},
        context_id:{type:'string',description:'Project ID or parent task ID'},
        context_type:{type:'string',enum:['project','parent'],description:'Whether context_id is a project or parent task'}
      }, required:['task_ids','context_id','context_type'] }}},
      { type:'function', function:{ name:'create_task_with_subtasks', description:'Create a parent task with subtasks in one operation. Returns parentId and subtaskIds.', parameters:{ type:'object', properties:{
        title:{type:'string',description:'Parent task title'},
        notes:{type:'string',description:'Parent task notes'},
        project_id:{type:'string',description:'Project ID for the parent task'},
        tag_ids:{type:'array',items:{type:'string'},description:'Tag IDs for the parent task'},
        subtasks:{type:'array',items:{type:'object',properties:{title:{type:'string'},notes:{type:'string'}}},description:'Subtask definitions [{title,notes}]'}
      }, required:['title','subtasks'] }}},
      { type:'function', function:{ name:'plan_tasks_for_today', description:'Plan tasks for today (adds to Today view) or unplan them. Max 100.', parameters:{ type:'object', properties:{
        task_ids:{type:'array',items:{type:'string'},description:'Task IDs to plan/unplan'},
        unplan:{type:'boolean',description:'If true, removes tasks from today instead (default false)'}
      }, required:['task_ids'] }}},
      { type:'function', function:{ name:'get_worklog', description:'Get worklog summary for a date range: time per day/project/tag, tasks completed, estimate accuracy.', parameters:{ type:'object', properties:{
        start_date:{type:'string',description:'Start date ISO (e.g. 2026-04-14)'},
        end_date:{type:'string',description:'End date ISO (e.g. 2026-04-20)'}
      }, required:['start_date','end_date'] }}},

      // ---------- PROJECTS ----------

      { type:'function', function:{ name:'create_project', description:'Create a new project.', parameters:{ type:'object', properties:{
        title:{type:'string',description:'Project title'},

    // ==================== SYSTEM PROMPT ====================
    var BASE_SYSTEM_PROMPT = 'You are an AI assistant integrated into Super Productivity, a task management app.\nYou can help users manage their tasks, projects, tags, and app state using the provided tools.\n\nRules:\n- Use tools to execute actions. Always confirm what you did.\n- Be concise. Match the user\'s language.\n- Prefer fetching tasks first to get IDs, then operate.\n- Summarize tool results human-friendly, don\'t dump raw JSON.\n- Time: 30min=1800000ms, 1h=3600000ms.\n- Current date: ' + new Date().toISOString().slice(0, 10);

    // ==================== TOOL EXECUTION ====================
    async function executeTool(name, args) {
      try {
        switch (name) {
          // ---- TASKS ----
          case 'create_task': {
            var d = {title:args.title, notes:args.notes||'', tagIds:args.tag_ids||[]};
            if(args.project_id) d.projectId = args.project_id;
            if(args.parent_id) d.parentId = args.parent_id;
            if(args.due_day) d.dueDay = args.due_day;
            if(args.time_estimate) d.timeEstimate = args.time_estimate;
            var id = await PluginAPI.addTask(d);
            return {success:true, task_id:id};
          }
          case 'get_tasks': {
            var tasks = await PluginAPI.getTasks();
            if(!args.include_done) tasks = tasks.filter(function(t){return !t.isDone;});
            if(args.project_id) tasks = tasks.filter(function(t){return t.projectId===args.project_id;});
            if(args.tag_id) tasks = tasks.filter(function(t){return t.tagIds&&t.tagIds.indexOf(args.tag_id)!==-1;});
            if(args.search_query){var q=args.search_query.toLowerCase();tasks=tasks.filter(function(t){return(t.title&&t.title.toLowerCase().indexOf(q)!==-1)||(t.notes&&t.notes.toLowerCase().indexOf(q)!==-1);});}
            if(args.parents_only) tasks = tasks.filter(function(t){return !t.parentId;});
            if(args.overdue){var today=new Date().toISOString().slice(0,10);tasks=tasks.filter(function(t){return t.dueDay&&t.dueDay<today;});}
            if(args.unscheduled) tasks = tasks.filter(function(t){return !t.dueDay&&!t.dueWithTime;});
            if(args.planned_for_today){var now=new Date(),sod=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime(),eot=sod+86400000;tasks=tasks.filter(function(t){return t.plannedAt&&t.plannedAt>=sod&&t.plannedAt<eot;});}
            if(args.recurring_only) tasks = tasks.filter(function(t){return t.repeatCfgId!=null;});
            return tasks.map(function(t){return{id:t.id,title:t.title,isDone:t.isDone,projectId:t.projectId,parentId:t.parentId,tagIds:t.tagIds,dueDay:t.dueDay,plannedAt:t.plannedAt,timeEstimate:t.timeEstimate,timeSpent:t.timeSpent,notes:t.notes?String(t.notes).slice(0,300):null,subTaskIds:t.subTaskIds,doneOn:t.doneOn};});
          }
          case 'update_task': {
            var u={};
            if(args.title!==undefined) u.title=args.title;
            if(args.notes!==undefined) u.notes=args.notes;
            if(args.is_done!==undefined){u.isDone=args.is_done;u.doneOn=args.is_done?Date.now():null;}
            if(args.due_day!==undefined) u.dueDay=args.due_day||null;
            if(args.planned_at!==undefined) u.plannedAt=args.planned_at;
            if(args.time_estimate!==undefined) u.timeEstimate=args.time_estimate;
            if(args.time_spent!==undefined) u.timeSpent=args.time_spent;
            if(args.tag_ids!==undefined) u.tagIds=args.tag_ids;
            if(args.project_id!==undefined) u.projectId=args.project_id;
            await PluginAPI.updateTask(args.task_id, u);
            return {success:true};
          }
          case 'complete_task': {
            var ct = await PluginAPI.getTasks();
            var found = ct.find(function(t){return t.id===args.task_id;});
            if(!found) return {error:'Task not found: '+args.task_id};
            await PluginAPI.updateTask(args.task_id, {isDone:true, doneOn:Date.now()});
            return {success:true};
          }
          case 'delete_task':
            await PluginAPI.deleteTask(args.task_id);
            return {success:true};
          case 'add_tag_to_task': {
            var at = await PluginAPI.getTasks();
            var af = at.find(function(t){return t.id===args.task_id;});
            if(!af) return {error:'Task not found'};
            var atags = af.tagIds?af.tagIds.slice():[];
            if(atags.indexOf(args.tag_id)===-1) atags.push(args.tag_id);
            await PluginAPI.updateTask(args.task_id, {tagIds:atags});
            return {success:true};
          }
          case 'remove_tag_from_task': {
            var rt = await PluginAPI.getTasks();
            var rf = rt.find(function(t){return t.id===args.task_id;});
            if(!rf) return {error:'Task not found'};
            var rtags = rf.tagIds?rf.tagIds.slice():[];
            var ri = rtags.indexOf(args.tag_id);
            if(ri===-1) return {error:'Tag not on task'};
            rtags.splice(ri,1);
            await PluginAPI.updateTask(args.task_id, {tagIds:rtags});
            return {success:true};
          }
          case 'get_current_task': {
            var all = await PluginAPI.getTasks();
            var cur = all.find(function(t){return t.isDone===false && t.id===currentTaskId;});
            return cur?{id:cur.id,title:cur.title,isDone:cur.isDone,projectId:cur.projectId,tagIds:cur.tagIds,timeEstimate:cur.timeEstimate}:null;
          }
          case 'start_task': {
            PluginAPI.dispatchAction({type:'[Task] SetCurrentTask',payload:{task:{id:args.task_id}}});
            PluginAPI.dispatchAction({type:'[Task] ToggleStart'});
            currentTaskId = args.task_id;
            return {success:true};
          }
          case 'stop_task': {
            PluginAPI.dispatchAction({type:'[Task] ToggleStart'});
            return {success:true};
          }
          case 'bulk_complete_tasks': {
            var results = [];
            for(var bi=0;bi<args.task_ids.length;bi++){
              try{await PluginAPI.updateTask(args.task_ids[bi],{isDone:true,doneOn:Date.now()});results.push({task_id:args.task_ids[bi],success:true});}
              catch(e){results.push({task_id:args.task_ids[bi],success:false,error:e.message});}
            }
            return {results:results};
          }
          case 'bulk_update_tasks': {
            var bresults = [];
            for(var bu=0;bu<args.updates.length;bu++){
              var upd=args.updates[bu],bd={};
              if(upd.title!==undefined)bd.title=upd.title;
              if(upd.notes!==undefined)bd.notes=upd.notes;
              if(upd.due_day!==undefined)bd.dueDay=upd.due_day||null;
              if(upd.tag_ids!==undefined)bd.tagIds=upd.tag_ids;
              if(upd.time_estimate!==undefined)bd.timeEstimate=upd.time_estimate;
              if(upd.time_spent!==undefined)bd.timeSpent=upd.time_spent;
              try{await PluginAPI.updateTask(upd.task_id,bd);bresults.push({task_id:upd.task_id,success:true});}
              catch(e){bresults.push({task_id:upd.task_id,success:false,error:e.message});}
            }
            return {results:bresults};
          }
          case 'move_task_to_project':
            await PluginAPI.updateTask(args.task_id, {projectId:args.project_id});
            return {success:true};
          case 'reorder_tasks':
            for(var ri2=0;ri2<args.task_ids.length;ri2++){
              try{await PluginAPI.updateTask(args.task_ids[ri2],{_order:ri2});}catch(e){}
            }
            return {success:true};
          case 'create_task_with_subtasks': {
            var parentId = await PluginAPI.addTask({title:args.title,notes:args.notes||'',projectId:args.project_id||null,tagIds:args.tag_ids||[]});
            var subIds = [];
            for(var si=0;si<(args.subtasks||[]).length;si++){
              var st=args.subtasks[si];
              var sid=await PluginAPI.addTask({title:st.title,notes:st.notes||'',parentId:parentId,projectId:args.project_id||null,tagIds:[]});
              subIds.push(sid);
            }
            return {parent_id:parentId, subtask_ids:subIds};
          }
          case 'plan_tasks_for_today': {
            var pnow=new Date(),pstart=new Date(pnow.getFullYear(),pnow.getMonth(),pnow.getDate()).getTime();
            var pval=args.unplan?null:pstart;
            var presults=[];
            for(var pi=0;pi<args.task_ids.length;pi++){
              try{await PluginAPI.updateTask(args.task_ids[pi],{plannedAt:pval});presults.push({task_id:args.task_ids[pi],success:true});}
              catch(e){presults.push({task_id:args.task_ids[pi],success:false,error:e.message});}
            }
            return {results:presults};
          }
          case 'get_worklog': {
            var wtasks = await PluginAPI.getTasks();
            var wdone = await PluginAPI.getArchivedTasks ? await PluginAPI.getArchivedTasks() : [];
            var wall = wtasks.concat(wdone);
            var daily={},byProject={},byTag={},completed=0,totalEst=0,totalAct=0;
            for(var wi=0;wi<wall.length;wi++){
              var wt=wall[wi];
              if(wt.timeSpentOnDay){for(var wd in wt.timeSpentOnDay){if(wd>=args.start_date&&wd<=args.end_date){daily[wd]=(daily[wd]||0)+wt.timeSpentOnDay[wd];var wp=wt.projectId||'No Project';byProject[wp]=(byProject[wp]||0)+wt.timeSpentOnDay[wd];for(var wti=0;wti<(wt.tagIds||[]).length;wti++){byTag[wt.tagIds[wti]]=(byTag[wt.tagIds[wti]]||0)+wt.timeSpentOnDay[wd];}}}}
              if(wt.isDone&&wt.doneOn){var wdd=new Date(wt.doneOn),wds=wdd.getFullYear()+'-'+String(wdd.getMonth()+1).padStart(2,'0')+'-'+String(wdd.getDate()).padStart(2,'0');if(wds>=args.start_date&&wds<=args.end_date){completed++;if(wt.timeEstimate>0){totalEst+=wt.timeEstimate;totalAct+=wt.timeSpent;}}}
            }
            return{dateRange:{start:args.start_date,end:args.end_date},daily:daily,byProject:byProject,byTag:byTag,tasksCompleted:completed,estimateAccuracy:totalEst>0?{estimateMs:totalEst,actualMs:totalAct,ratio:totalAct/totalEst}:null};
          }

          // ---- PROJECTS ----
          case 'get_projects':
            return (await PluginAPI.getAllProjects()).map(function(p){return{id:p.id,title:p.title,taskCount:p.taskIds?p.taskIds.length:0};});
          case 'create_project': {
            var pdata={title:args.title};
            if(args.description) pdata.description=args.description;
            if(args.color) pdata.theme={primary:args.color};
            return {success:true, project_id:await PluginAPI.addProject(pdata)};
          }
          case 'update_project': {
            var up={};
            if(args.title!==undefined) up.title=args.title;
            if(args.color!==undefined) up.theme={primary:args.color};
            await PluginAPI.updateProject(args.project_id, up);
            return {success:true};
          }

          // ---- TAGS ----
          case 'get_tags':
            return (await PluginAPI.getAllTags()).map(function(t){return{id:t.id,title:t.title,color:t.color,icon:t.icon};});
          case 'create_tag': {
            var td2={title:args.title};
            if(args.color) td2.color=args.color;
            return {success:true, tag_id:await PluginAPI.addTag(td2)};
          }
          case 'update_tag': {
            var tu={};
            if(args.title!==undefined) tu.title=args.title;
            if(args.color!==undefined) tu.color=args.color;
            if(args.icon!==undefined) tu.icon=args.icon;
            await PluginAPI.updateTag(args.tag_id, tu);
            return {success:true};
          }

          // ---- APP STATE ----
          case 'set_active_work_context':
            PluginAPI.dispatchAction({type:'[WorkContext] SetActiveWorkContext',activeId:args.context_id});
            return {success:true};
          case 'show_notification':
            PluginAPI.dispatchAction({type:'[Snack] Show',message:args.message||'',data:{type:args.type||'INFO'}});
            return {success:true};

          default: return {error:'Unknown tool: '+name};
        }
      } catch (e) { return {error:e.message||String(e)}; }
    }

    // ==================== CONTEXT ====================
    async function buildContext() {
      try {
        var tasks = await PluginAPI.getCurrentContextTasks();
        var projects = await PluginAPI.getAllProjects();
        var tags = await PluginAPI.getAllTags();
        var active = tasks.filter(function(t){return !t.isDone;}).slice(0,30);
        var cur = currentTaskId ? tasks.find(function(t){return t.id===currentTaskId;}) : null;
        return JSON.stringify({
          currentDate:new Date().toISOString().slice(0,10), currentTime:new Date().toLocaleTimeString(),
          currentTask:cur?{id:cur.id,title:cur.title}:null,
          stats:{total:tasks.length,active:active.length},
          activeTasks:active.map(function(t){return{id:t.id,title:t.title,dueDay:t.dueDay,timeEstimate:t.timeEstimate};}),
          projects:projects.map(function(p){return{id:p.id,title:p.title,taskCount:p.taskIds?p.taskIds.length:0};}),
          tags:tags.map(function(t){return{id:t.id,title:t.title};}),
        });
      } catch(e) { return '{"error":"'+e.message+'"}'; }
    }

    // ==================== OPENAI API ====================
    async function callOpenAI(msgs) {
      var baseUrl = (config.baseUrl||'https://api.openai.com/v1').replace(/\/+$/,'');
      var sys = BASE_SYSTEM_PROMPT;
      var full = [{role:'system',content:sys}].concat(msgs);
      var resp = await fetch(baseUrl+'/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+config.apiKey},
        body:JSON.stringify({model:config.model||'gpt-4o',messages:full,tools:tools,tool_choice:'auto',max_tokens:config.maxTokens||4096,temperature:config.temperature!==undefined?config.temperature:0.7})
      });
      if(!resp.ok){var t=await resp.text(); throw new Error('API '+resp.status+': '+t.slice(0,300));}
      var data=await resp.json();
      if(data.error) throw new Error(data.error.message||JSON.stringify(data.error));
      return data;
    }

    // ==================== CHAT ====================
    async function sendMessage(userText) {
      if (!userText.trim() || isProcessing) return;
      if (!config || !config.apiKey) { showConfigWarning(); return; }

      isProcessing = true; updateSendBtn();
      displayMessage('user', userText);

      var ctx = await buildContext();
      messages.push({role:'user',content:userText+'\n\n---\n[App Context]\n'+ctx});

      var thinkingEl = showThinking();
      try {
        var maxRounds = 5, round = 0;
        var response = await callOpenAI(messages);
        var allActions = [];
        while (round < maxRounds) {
          var choice = response.choices && response.choices[0];
          if (!choice) throw new Error('No response');
          var am = choice.message;
          if (am.tool_calls && am.tool_calls.length > 0) {
            messages.push({role:'assistant',content:am.content||null,tool_calls:am.tool_calls});
            for (var i=0;i<am.tool_calls.length;i++) {
              var tc=am.tool_calls[i], args={};
              try{args=JSON.parse(tc.function.arguments);}catch(e){}
              var result=await executeTool(tc.function.name,args);
              allActions.push({name:tc.function.name,args:args,result:result});
              messages.push({role:'tool',tool_call_id:tc.id,content:JSON.stringify(result).slice(0,6000)});
            }
            response=await callOpenAI(messages); round++;
          } else {
            messages.push({role:'assistant',content:am.content});
            removeThinking(thinkingEl);
            if(allActions.length>0) displayActions(allActions);
            displayMessage('assistant',am.content||'(No response)');
            break;
          }
        }
        if(round>=maxRounds){removeThinking(thinkingEl);if(allActions.length>0)displayActions(allActions);displayMessage('assistant','⚠️ Max rounds reached.');}
      } catch(e) { removeThinking(thinkingEl); displayError(e.message); }
      isProcessing=false; updateSendBtn(); saveConversation();
    }

    // ==================== MARKDOWN RENDERER ====================
    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderMarkdown(md) {
      // Extract code blocks first to protect them
      var codeBlocks = [];
      md = md.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
        codeBlocks.push({ lang: lang, code: code });
        return '%%CODEBLOCK_' + (codeBlocks.length - 1) + '%%';
      });

      // Protect inline code
      var inlineCodes = [];
      md = md.replace(/`([^`\n]+)`/g, function(_, code) {
        inlineCodes.push(code);
        return '%%INLINE_' + (inlineCodes.length - 1) + '%%';
      });

      // Headers
      md = md.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
      md = md.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      md = md.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      md = md.replace(/^# (.+)$/gm, '<h1>$1</h1>');

      // Horizontal rules
      md = md.replace(/^---+$/gm, '<hr>');

      // Bold and italic
      md = md.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      md = md.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      md = md.replace(/\*(.+?)\*/g, '<em>$1</em>');

      // Links
      md = md.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

      // Blockquotes
      md = md.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
      md = md.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

      // Tables
      md = md.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)+)/gm, function(_, header, sep, body) {
        var hCells = header.split('|').filter(function(c){return c.trim();});
        var thead = '<tr>' + hCells.map(function(c){return '<th>'+c.trim()+'</th>';}).join('') + '</tr>';
        var rows = body.trim().split('\n').map(function(row) {
          var cells = row.split('|').filter(function(c){return c.trim();});
          return '<tr>' + cells.map(function(c){return '<td>'+c.trim()+'</td>';}).join('') + '</tr>';
        });
        return '<table><thead>'+thead+'</thead><tbody>'+rows.join('')+'</tbody></table>';
      });

      // Unordered lists
      md = md.replace(/^(?:- (.+)\n?)+/gm, function(match) {
        var items = match.trim().split('\n').map(function(line) {
          return '<li>' + line.replace(/^- /, '') + '</li>';
        });
        return '<ul>' + items.join('') + '</ul>';
      });

      // Ordered lists
      md = md.replace(/^(?:\d+\. (.+)\n?)+/gm, function(match) {
        var items = match.trim().split('\n').map(function(line) {
          return '<li>' + line.replace(/^\d+\. /, '') + '</li>';
        });
        return '<ol>' + items.join('') + '</ol>';
      });

      // Paragraphs (double newline)
      md = md.replace(/\n\n+/g, '</p><p>');
      // Single newlines to <br> (but not inside tags)
      md = md.replace(/\n/g, '<br>');

      // Wrap in paragraph
      md = '<p>' + md + '</p>';
      // Clean empty paragraphs
      md = md.replace(/<p>\s*<\/p>/g, '');
      // Clean paragraphs wrapping block elements
      md = md.replace(/<p>\s*(<h[1-4]|<ul|<ol|<table|<hr|<blockquote|<pre)/g, '$1');
      md = md.replace(/(<\/h[1-4]>|<\/ul>|<\/ol>|<\/table>|<hr>|<\/blockquote>|<\/pre>)\s*<\/p>/g, '$1');

      // Restore code blocks
      md = md.replace(/%%CODEBLOCK_(\d+)%%/g, function(_, i) {
        var cb = codeBlocks[parseInt(i)];
        return '<pre><code>' + escapeHtml(cb.code.replace(/\n$/, '')) + '</code></pre>';
      });

      // Restore inline code
      md = md.replace(/%%INLINE_(\d+)%%/g, function(_, i) {
        return '<code>' + escapeHtml(inlineCodes[parseInt(i)]) + '</code>';
      });

      return md;
    }

    // ==================== UI ====================
    function displayMessage(role,text) {
      var c=document.getElementById('chat-container');
      var w=c.querySelector('.welcome'); if(w)w.remove();
      var d=document.createElement('div'); d.className='message '+role;
      var b=document.createElement('div'); b.className='msg-bubble';
      if (role === 'assistant') { b.innerHTML = renderMarkdown(text); }
      else { b.textContent = text; }
      d.appendChild(b);
      var t=document.createElement('div'); t.className='msg-time'; t.textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); d.appendChild(t);
      c.appendChild(d); c.scrollTop=c.scrollHeight;
    }
    function displayActions(actions) {
      var c=document.getElementById('chat-container');
      var d=document.createElement('div'); d.className='action-cards message assistant';
      for(var i=0;i<actions.length;i++){var a=actions[i];
        var card=document.createElement('div'); card.className='action-card '+(a.result.error?'error':'success');
        var ic=document.createElement('span'); ic.className='action-icon'; ic.textContent=a.result.error?'✗':'✓';
        var n=document.createElement('span'); n.className='action-name'; n.textContent=a.name;
        var dt=document.createElement('span'); dt.className='action-detail'; dt.textContent=a.args.title||a.args.task_id?(a.args.title||a.args.task_id.slice(0,8)+'...'):'';
        card.appendChild(ic);card.appendChild(n);card.appendChild(dt);d.appendChild(card);
      }
      c.appendChild(d); c.scrollTop=c.scrollHeight;
    }
    function displayError(msg) {
      var c=document.getElementById('chat-container');
      var d=document.createElement('div'); d.className='error-banner'; d.textContent='⚠ '+msg;
      d.onclick=function(){d.remove();}; c.appendChild(d); c.scrollTop=c.scrollHeight;
    }
    function showThinking() {
      var c=document.getElementById('chat-container');
      var d=document.createElement('div'); d.className='message assistant';
      d.innerHTML='<div class="thinking"><div class="thinking-dots"><span></span><span></span><span></span></div>Thinking...</div>';
      c.appendChild(d); c.scrollTop=c.scrollHeight; return d;
    }
    function removeThinking(el){if(el&&el.parentNode)el.parentNode.removeChild(el);}
    function showWelcome() {
      document.getElementById('chat-container').innerHTML=
        '<div class="welcome"><div class="welcome-icon">🤖</div><h3>AI Assistant</h3>'+
        '<p>I can help manage tasks, projects, and tags.<br>Tell me what you need!</p>'+
        '<div class="quick-actions">'+
        '<button class="quick-action" onclick="quickSend(\'Show me my tasks\')">📋 My tasks</button>'+
        '<button class="quick-action" onclick="quickSend(\'What should I focus on today?\')">🎯 Focus today</button>'+
        '<button class="quick-action" onclick="quickSend(\'Create a task: \')">➕ New task</button>'+
        '<button class="quick-action" onclick="quickSend(\'Show my projects\')">📁 Projects</button>'+
        '</div></div>';
    }
    function showConfigWarning() {
      document.getElementById('chat-container').innerHTML=
        '<div class="config-warning"><div class="welcome-icon">⚙️</div><h3>Configuration Required</h3>'+
        '<p>Click the ⚙️ button in the top-right corner to configure your API key.</p></div>';
    }
    function showSnack(msg) {
      var c=document.getElementById('chat-container');
      var d=document.createElement('div'); d.className='action-card success'; d.style.cssText='max-width:100%;justify-content:center;margin:8px 0;';
      d.innerHTML='<span class="action-icon">✓</span><span>'+msg+'</span>';
      c.appendChild(d); setTimeout(function(){d.remove();},3000);
    }
    function quickSend(text) {
      var input=document.getElementById('input'); input.value=text; input.focus(); autoResize();
      if(text.endsWith(': ')||text.endsWith(':')){} else {sendMessage(text);input.value='';autoResize();}
    }
    function autoResize() {
      var i=document.getElementById('input'); i.style.height='auto'; i.style.height=Math.min(i.scrollHeight,120)+'px';
    }
    function updateSendBtn(){document.getElementById('send-btn').disabled=isProcessing;}
    function clearConversation(){messages=[];showWelcome();saveConversation();}

    // ==================== INIT ====================
    function setupEventListeners() {
      var input=document.getElementById('input');
      var sendBtn=document.getElementById('send-btn');
      var clearBtn=document.getElementById('clear-btn');
      var settingsBtn=document.getElementById('settings-btn');
      var settingsSave=document.getElementById('settings-save');
      var settingsCancel=document.getElementById('settings-cancel');

      input.addEventListener('input',autoResize);
      input.addEventListener('keydown',function(e){
        if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();var t=input.value;if(t.trim()){sendMessage(t);input.value='';autoResize();}}
      });
      sendBtn.addEventListener('click',function(){var t=input.value;if(t.trim()){sendMessage(t);input.value='';autoResize();}});
      clearBtn.addEventListener('click',function(){if(confirm('Clear conversation?'))clearConversation();});
      settingsBtn.addEventListener('click',openSettings);
      settingsSave.addEventListener('click',doSaveSettings);
      settingsCancel.addEventListener('click',closeSettings);
      document.getElementById('settings-overlay').addEventListener('click',function(e){
        if(e.target===this)closeSettings();
      });
    }

    async function initPlugin() {
      setupEventListeners();
      var hasConfig = await loadConfig();
      updateModelBadge();
      if (!hasConfig) {
        showConfigWarning();
      } else {
        var hasConv = await loadConversation();
        if (!hasConv) showWelcome();
      }
    }

    function waitForPlugin() {
      if (typeof PluginAPI !== 'undefined') {
        initPlugin();
      } else {
        setTimeout(waitForPlugin, 100);
      }
    }
    waitForPlugin();
  </script>
</body>
</html>
