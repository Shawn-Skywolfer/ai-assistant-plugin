name: Release Plugin

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.12.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.13'

      - name: Extract version from manifest.json
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run static checks
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          HTMLParser().feed(Path('index.html').read_text(encoding='utf-8'))
          print('html parser ok')
          PY
          python3 - <<'PY'
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          start = html.index('<script>') + len('<script>')
          end = html.index('</script>', start)
          Path('/tmp/index-script.js').write_text(html[start:end], encoding='utf-8')
          PY
          node --check /tmp/index-script.js

      - name: Create plugin package
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          scripts/build-release.sh "${{ steps.version.outputs.tag }}" linux x64 dist/release

      - name: Verify release asset path
        if: steps.check_tag.outputs.exists == 'false'
        id: package
        run: |
          zip_path="dist/release/${GITHUB_REPOSITORY#*/}-${{ steps.version.outputs.tag }}-linux-x64.zip"
          test -f "$zip_path"
          sha256sum "$zip_path" > "$zip_path.sha256"
          echo "zip_path=$zip_path" >> "$GITHUB_OUTPUT"
          echo "zip_name=$(basename "$zip_path")" >> "$GITHUB_OUTPUT"

      - name: Upload ZIP artifact
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.zip_name }}
          path: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.zip_path }}.sha256
          if-no-files-found: error

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: |
            ## AI Assistant Plugin ${{ steps.version.outputs.tag }}

            ### Installation
            1. Download `${{ steps.package.outputs.zip_name }}`
            2. In Super Productivity, go to Settings → Plugins
            3. Click "Install from file" and select the downloaded zip

            ### Changes
            See [commit history](https://github.com/${{ github.repository }}/commits/master) for details.
          files: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.zip_path }}.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
